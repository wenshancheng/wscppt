name: Deploy pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      # 不需要 npm install 和 build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist  # 或 .（如果文件在根目录）
      
      - name: Deploy
        uses: actions/deploy-pages@v5
